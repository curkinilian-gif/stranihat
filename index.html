<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои ссылки</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: #0e0e12; color: #fff; min-height: 100vh; padding: 48px 32px 80px; }
  header { margin-bottom: 36px; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  header p { font-size: 14px; color: #555; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; max-width: 900px; }
  .tile { aspect-ratio: 1; background: #17171d; border: 1px solid #222229; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; text-decoration: none; color: #fff; position: relative; transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s; overflow: hidden; }
  .tile::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 70%); pointer-events: none; }
  .tile:hover { transform: translateY(-4px) scale(1.03); border-color: #3a3a48; box-shadow: 0 16px 40px rgba(0,0,0,0.5); }
  .tile:active { transform: scale(0.97); }
  .tile-icon { width: 48px; height: 48px; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #222229; }
  .tile-icon img { width: 30px; height: 30px; object-fit: contain; }
  .tile-icon .emoji { font-size: 26px; line-height: 1; }
  .tile-name { font-size: 12px; font-weight: 600; text-align: center; padding: 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; color: #ccc; }
  .loading { color: #444; font-size: 14px; padding: 20px 0; }
  @media (max-width: 500px) { body { padding: 32px 16px 60px; } .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; } }
</style>
</head>
<body>
<header>
  <h1>Мои ссылки</h1>
  <p>Нажми на сайт — перейдёшь туда</p>
</header>
<div class="grid" id="grid"><div class="loading">Загрузка...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCk8NiKxPr2FHng5Uo6u6LWZ_iguXu3U14",
  authDomain: "spike-2413a.firebaseapp.com",
  databaseURL: "https://spike-2413a-default-rtdb.firebaseio.com",
  projectId: "spike-2413a",
  storageBucket: "spike-2413a.firebasestorage.app",
  messagingSenderId: "760306310867",
  appId: "1:760306310867:web:a3d43b802018b607d6be26"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function fav(url) {
  try { return 'https://www.google.com/s2/favicons?sz=64&domain=' + new URL(url).hostname; }
  catch { return ''; }
}

onValue(ref(db, 'links'), (snapshot) => {
  const grid = document.getElementById('grid');
  const data = snapshot.val();
  if (!data) { grid.innerHTML = '<div class="loading">Ссылок пока нет</div>'; return; }
  const items = Object.values(data);
  grid.innerHTML = items.map(it => `
    <a class="tile" href="${it.url}" target="_blank">
      <div class="tile-icon">
        <img src="${fav(it.url)}" onerror="this.style.display='none';this.nextSibling.style.display='block'">
        <span class="emoji" style="display:none">🔗</span>
      </div>
      <span class="tile-name">${it.name}</span>
    </a>
  `).join('');
});
</script>
</body>
</html>
